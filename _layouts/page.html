<!doctype html>
<!--[if lt IE 7]><html class="no-js lt-ie9 lt-ie8 lt-ie7" lang="{% if page.lang %}{{ page.lang }}{% else %}en{% endif %}"> <![endif]-->
<!--[if (IE 7)&!(IEMobile)]><html class="no-js lt-ie9 lt-ie8" lang="{% if page.lang %}{{ page.lang }}{% else %}en{% endif %}"><![endif]-->
<!--[if (IE 8)&!(IEMobile)]><html class="no-js lt-ie9" lang="{% if page.lang %}{{ page.lang }}{% else %}en{% endif %}"><![endif]-->
<!--[if gt IE 8]><!--> <html class="no-js" lang="{% if page.lang %}{{ page.lang }}{% else %}en{% endif %}"><!--<![endif]-->
<head>
{% include _head.html %}
</head>

<body class="page">

{% include _browser-upgrade.html %}
{% include _navigation.html %}

<div id="main" role="main" class="page-shell">
  <article class="page-frame">
    <header class="page-header">
      <h1>{{ page.title }}</h1>
      <hr class="title-separator">
    </header>
    <div class="article-wrap">
      {{ content }}
    </div>
    {% if site.owner.disqus-shortname and page.comments == true %}
      <section id="disqus_thread"></section>
    {% endif %}
  </article>
</div>

<div class="footer-wrap">
  <footer>
    {% include _footer.html %}
  </footer>
</div>

{% include _scripts.html %}

<script>
(function() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -30px 0px' });

  document.querySelectorAll('.fade-in, .line-grow').forEach(el => observer.observe(el));
})();
</script>

</body>
</html>
