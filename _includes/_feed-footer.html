{% if post.lang == 'zh' and site.title_zh %}
{% assign display_title = site.title_zh %}
{% else %}
{% assign display_title = site.title %}
{% endif %}
<p><a href="{{ site.url }}{{ post.url }}">{{ post.title | xml_escape }}</a> was originally published by {{ site.owner.name }} at <a href="{{ site.url }}">{{ display_title }}</a> on {{ post.date | date: "%B %d, %Y" }}.</p>
